apiVersion: apps/v1
kind: Deployment
metadata:
  name: lecpac-rss-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lecpac-rss-api
  template:
    metadata:
      labels:
        app: lecpac-rss-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/lecpac-rss-demo:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: lecpac-rss-config
            - secretRef:
                name: lecpac-rss-secret
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
