services:
  db:
    image: pgvector/pgvector:pg16
    container_name: lecpac_pgvector
    environment:
      POSTGRES_DB: lecpac
      POSTGRES_USER: lecpac
      POSTGRES_PASSWORD: lecpac
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lecpac -d lecpac"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lecpac_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://lecpac:lecpac@db:5432/lecpac
      VECTOR_DIM: 384
      RSS_FEEDS: https://hnrss.org/frontpage,https://www.reddit.com/r/programming/.rss,https://techcrunch.com/feed/,https://www.theverge.com/rss/index.xml,https://feeds.arstechnica.com/arstechnica/index,https://www.infoq.com/feed/
      INGEST_INTERVAL_MINUTES: 30
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
    ports:
      - "8000:8000"

volumes:
  pgdata:
